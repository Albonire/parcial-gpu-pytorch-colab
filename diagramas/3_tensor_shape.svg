<svg xmlns="http://www.w3.org/2000/svg" width="500" height="320" viewBox="0 0 500 320">
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- 3D cube representing the tensor -->
  <!-- Front face -->
  <rect x="120" y="80" width="180" height="180" fill="none" stroke="black" stroke-width="2"/>
  
  <!-- Top face (perspective) -->
  <polygon points="120,80 140,60 320,60 300,80" fill="none" stroke="black" stroke-width="2"/>
  
  <!-- Right face (perspective) - thin because C=1 -->
  <polygon points="300,80 320,60 320,240 300,260" fill="none" stroke="black" stroke-width="2"/>
  
  <!-- Grid lines on front face (showing 28x28 concept) -->
  <line x1="120" y1="140" x2="300" y2="140" stroke="black" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="120" y1="200" x2="300" y2="200" stroke="black" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="180" y1="80" x2="180" y2="260" stroke="black" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="240" y1="80" x2="240" y2="260" stroke="black" stroke-width="0.5" stroke-dasharray="4,4"/>
  
  <!-- Dimension labels -->
  <!-- Height = 28 -->
  <line x1="90" y1="80" x2="90" y2="260" stroke="black" stroke-width="1"/>
  <line x1="85" y1="80" x2="95" y2="80" stroke="black" stroke-width="1"/>
  <line x1="85" y1="260" x2="95" y2="260" stroke="black" stroke-width="1"/>
  <text x="80" y="175" font-family="monospace" font-size="14" fill="black" text-anchor="end">28</text>
  <text x="80" y="195" font-family="monospace" font-size="11" fill="black" text-anchor="end">(alto)</text>
  
  <!-- Width = 28 -->
  <line x1="120" y1="280" x2="300" y2="280" stroke="black" stroke-width="1"/>
  <line x1="120" y1="275" x2="120" y2="285" stroke="black" stroke-width="1"/>
  <line x1="300" y1="275" x2="300" y2="285" stroke="black" stroke-width="1"/>
  <text x="210" y="300" font-family="monospace" font-size="14" fill="black" text-anchor="middle">28 (ancho)</text>
  
  <!-- Channel = 1 -->
  <line x1="310" y1="50" x2="330" y2="50" stroke="black" stroke-width="1"/>
  <line x1="300" y1="75" x2="300" y2="50" stroke="black" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="320" y1="55" x2="320" y2="50" stroke="black" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="350" y="55" font-family="monospace" font-size="14" fill="black" text-anchor="start">1 (canal)</text>
  <text x="350" y="72" font-family="monospace" font-size="11" fill="black" text-anchor="start">escala de grises</text>
  
  <!-- Pixel value annotation -->
  <rect x="180" y="140" width="60" height="60" fill="black" fill-opacity="0.3" stroke="black" stroke-width="1"/>
  <text x="210" y="175" font-family="monospace" font-size="10" fill="black" text-anchor="middle">pixel</text>
  <text x="210" y="188" font-family="monospace" font-size="10" fill="black" text-anchor="middle">[0-255]</text>
  
  <!-- Shape notation -->
  <text x="250" y="310" font-family="monospace" font-size="13" fill="black" text-anchor="middle">[1, 28, 28] = [C, H, W]</text>
</svg>
