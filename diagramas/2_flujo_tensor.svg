<svg xmlns="http://www.w3.org/2000/svg" width="700" height="280" viewBox="0 0 700 280">
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- CPU Box -->
  <rect x="40" y="40" width="200" height="200" rx="8" fill="none" stroke="black" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="140" y="70" font-family="monospace" font-size="16" fill="black" text-anchor="middle">CPU (Host)</text>
  
  <!-- tensor_cpu -->
  <rect x="65" y="90" width="150" height="40" rx="4" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="140" y="115" font-family="monospace" font-size="13" fill="black" text-anchor="middle">tensor_cpu</text>
  
  <!-- resultado_cpu -->
  <rect x="65" y="175" width="150" height="40" rx="4" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="140" y="200" font-family="monospace" font-size="13" fill="black" text-anchor="middle">resultado.cpu()</text>
  
  <!-- GPU Box -->
  <rect x="460" y="40" width="200" height="200" rx="8" fill="none" stroke="black" stroke-width="2"/>
  <text x="560" y="70" font-family="monospace" font-size="16" fill="black" text-anchor="middle">GPU (Device)</text>
  
  <!-- tensor_gpu -->
  <rect x="485" y="90" width="150" height="40" rx="4" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="560" y="115" font-family="monospace" font-size="13" fill="black" text-anchor="middle">tensor_gpu</text>
  
  <!-- resultado_gpu -->
  <rect x="485" y="175" width="150" height="40" rx="4" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="560" y="200" font-family="monospace" font-size="13" fill="black" text-anchor="middle">resultado_gpu</text>
  
  <!-- Arrow CPU -> GPU (top) -->
  <line x1="215" y1="110" x2="485" y2="110" stroke="black" stroke-width="1.5"/>
  <polygon points="485,110 475,105 475,115" fill="black"/>
  <text x="350" y="100" font-family="monospace" font-size="12" fill="black" text-anchor="middle">.to('cuda')</text>
  
  <!-- Arrow GPU operation (vertical) -->
  <line x1="560" y1="130" x2="560" y2="175" stroke="black" stroke-width="1.5"/>
  <polygon points="560,175 555,165 565,165" fill="black"/>
  <text x="610" y="155" font-family="monospace" font-size="11" fill="black" text-anchor="start">* 2</text>
  
  <!-- Arrow GPU -> CPU (bottom) -->
  <line x1="485" y1="195" x2="215" y2="195" stroke="black" stroke-width="1.5"/>
  <polygon points="215,195 225,190 225,200" fill="black"/>
  <text x="350" y="185" font-family="monospace" font-size="12" fill="black" text-anchor="middle">.to('cpu')</text>
  
  <!-- Step numbers -->
  <circle cx="300" cy="110" r="12" fill="black"/>
  <text x="300" y="115" font-family="monospace" font-size="11" fill="white" text-anchor="middle">1</text>
  
  <circle cx="590" cy="152" r="12" fill="black"/>
  <text x="590" y="157" font-family="monospace" font-size="11" fill="white" text-anchor="middle">2</text>
  
  <circle cx="300" cy="195" r="12" fill="black"/>
  <text x="300" y="200" font-family="monospace" font-size="11" fill="white" text-anchor="middle">3</text>
</svg>
